<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedType - Typing Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>SpeedType</h1>
      <div class="stats">
        <span>Time: <strong id="timer">20</strong>s</span>
        <span>WPM: <strong id="wpm">0</strong></span>
        <span>Accuracy: <strong id="accuracy">100</strong>%</span>
      </div>
    </header>

    <div id="text-display" class="text-display"></div>

    <textarea id="input" placeholder="Start typing here..." autofocus></textarea>

    <div class="controls">
      <button id="start-btn">Start Test</button>
      <button id="restart-btn" class="hidden">Restart</button>
    </div>

    <div id="results" class="results hidden">
      <h2>Your Results</h2>
      <div class="result-stats">
        <p>WPM: <span id="final-wpm"></span></p>
        <p>Accuracy: <span id="final-acc"></span>%</p>
        <p>Characters: <span id="final-chars"></span></p>
      </div>
      <button id="try-again">Try Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
